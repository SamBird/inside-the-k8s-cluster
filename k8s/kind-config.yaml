kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: inside-k8s
networking:
  ipFamily: ipv4
nodes:
  - role: control-plane
    labels:
      topology.kubernetes.io/zone: local-a
      demo/node-role: control-plane
  - role: worker
    labels:
      topology.kubernetes.io/zone: local-b
      demo/node-role: worker
  - role: worker
    labels:
      topology.kubernetes.io/zone: local-c
      demo/node-role: worker
